PATH=${HOME}/.asdf/shims:${HOME}/.local/bin:${HOME}/.local/scripts:${HOME}/.cargo/bin:${HOME}/go/bin:${PATH}

XDG_CONFIG_HOME=${HOME}/.config
XDG_DATA_HOME=${HOME}/.local/share

# Stem darkening for macOS-like font weight at small sizes
FREETYPE_PROPERTIES="cff:no-stem-darkening=0 autofitter:no-stem-darkening=0"

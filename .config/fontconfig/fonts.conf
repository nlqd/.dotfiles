<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

  <!-- macOS-style rendering: grayscale AA + slight hinting + stem darkening (via env var) -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="rgba" mode="assign"><const>none</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcdnone</const></edit>
  </match>

  <!-- Default families -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Sans CJK JP</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Noto Serif CJK JP</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>Berkeley Mono</family>
      <family>BerkeleyMono Nerd Font Mono</family>
      <family>JetBrainsMono NF</family>
      <family>Noto Sans Mono</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Map common macOS/web font names to available equivalents -->
  <alias binding="same">
    <family>Helvetica</family>
    <prefer><family>Noto Sans</family></prefer>
  </alias>
  <alias binding="same">
    <family>Helvetica Neue</family>
    <prefer><family>Noto Sans</family></prefer>
  </alias>
  <alias binding="same">
    <family>-apple-system</family>
    <prefer><family>Noto Sans</family></prefer>
  </alias>
  <alias binding="same">
    <family>BlinkMacSystemFont</family>
    <prefer><family>Noto Sans</family></prefer>
  </alias>
  <alias binding="same">
    <family>Arial</family>
    <prefer><family>Noto Sans</family></prefer>
  </alias>
  <alias binding="same">
    <family>Times New Roman</family>
    <prefer><family>Noto Serif</family></prefer>
  </alias>

</fontconfig>

### Options

set -sa terminal-features "tmux-*:RGB:clipboard"
set -sa terminal-features "foot*:RGB:clipboard:sixel"
set -sa terminal-features "alacritty:RGB"

set -g window-active-style bg=terminal
set -g window-style        bg=black

set -g set-titles on
set -g set-titles-string "[#{=/16/...:session_name}] #W #T"
set -g prefix C-a
bind C-a send-prefix
unbind C-b

set -g base-index 1
set -g pane-base-index 1

set -g default-shell $SHELL
set -g mode-keys vi

set -g escape-time 10
set -g focus-events on
set -g history-limit 999999
set -g mouse on
set -g allow-passthrough on
set -g visual-activity off
set -g status-interval 60
set -g set-clipboard on
set -g status-left-length 32
# responsive status bar: #{e|>=:width,threshold} evaluates comparison, #{?condition,true,false} shows content conditionally
set -g status-left '#{?#{e|>=:#{client_width},80},[#{=/16/...:session_name}] ,}'
set -g status-right '#{?#{e|>=:#{client_width},80},#(usd)đ #(sui-price) ,}'

set -g status-right-length 80

# drag-and-copy
if-shell '[ -n "$WAYLAND_DISPLAY" ]' \
    'set -s copy-command "wl-copy"' \
    'set -s copy-command "xsel --clipboard --input"'
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe

# copy last command's output (OSC 133 marks via shim in .zshrc.aiws)
# prefix+O selects the last block; then bare O/I walk to older/newer blocks
bind O {
  copy-mode
  send -X previous-prompt -o
  send -X begin-selection
  send -X next-prompt
  send -X cursor-up
  send -X end-of-line
  send -X stop-selection
}

# walk older: normalize onto current block's output-start, then step up one block.
# previous-prompt -o stays put with no older match, so this parks on the oldest.
bind -T copy-mode-vi O {
  send -X clear-selection
  send -X previous-prompt
  send -X next-prompt -o
  send -X previous-prompt -o
  send -X begin-selection
  send -X next-prompt
  send -X cursor-up
  send -X end-of-line
  send -X stop-selection
}

# walk newer: same normalize, then step down one block (parks on the newest).
bind -T copy-mode-vi I {
  send -X clear-selection
  send -X previous-prompt
  send -X next-prompt -o
  send -X next-prompt -o
  send -X begin-selection
  send -X next-prompt
  send -X cursor-up
  send -X end-of-line
  send -X stop-selection
}

bind r source ~/.config/tmux/tmux.conf; display "Config reloaded..."
bind f run 'tmux neww tmux-sessionizer'
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
# bind y run 'tmux splitw -l 30% "cd dev && claude"'
# bind Y run 'tmux splitw -l 30% "sdai c"'

# vim-like pane switching
bind k select-pane -U
bind j select-pane -D
bind h select-pane -L
bind l select-pane -R

# quicky get to a named session fuzzily, default to the 0th
bind a command-prompt -p "session fuzzy:" \
"run 'tmux switch -t $(tmux ls -F \"##{session_name}\" | fzf --filter \"%%\" | head -n 1)'"
# jump to session by choose-tree slot (session-id order, 0-indexed)
# alt+homerow: a=0 w=1 e=2 r=3 s=4 d=5 f=6
bind M-a run "tmux switch -t \"$(tmux ls -F '##{session_id}|##{session_name}' | sort -t'|' -k1.2,1n | sed -n 1p | cut -d'|' -f2)\""
bind M-w run "tmux switch -t \"$(tmux ls -F '##{session_id}|##{session_name}' | sort -t'|' -k1.2,1n | sed -n 2p | cut -d'|' -f2)\""
bind M-e run "tmux switch -t \"$(tmux ls -F '##{session_id}|##{session_name}' | sort -t'|' -k1.2,1n | sed -n 3p | cut -d'|' -f2)\""
bind M-r run "tmux switch -t \"$(tmux ls -F '##{session_id}|##{session_name}' | sort -t'|' -k1.2,1n | sed -n 4p | cut -d'|' -f2)\""
bind M-s run "tmux switch -t \"$(tmux ls -F '##{session_id}|##{session_name}' | sort -t'|' -k1.2,1n | sed -n 5p | cut -d'|' -f2)\""
bind M-d run "tmux switch -t \"$(tmux ls -F '##{session_id}|##{session_name}' | sort -t'|' -k1.2,1n | sed -n 6p | cut -d'|' -f2)\""
bind M-f run "tmux switch -t \"$(tmux ls -F '##{session_id}|##{session_name}' | sort -t'|' -k1.2,1n | sed -n 7p | cut -d'|' -f2)\""
bind X confirm-before -p "kill session? (y/n)" "kill-session"

# clear screen and history for better compile-error-fix workflow
bind C-l send -R \; run 'sleep 0.1' \; send C-l \; run 'sleep 0.1' \; clear-history
bind C-_ copy-mode \; send /
bind C-u copy-mode \; send C-u
bind [ copy-mode
# bind C-u run 'tmux-rnu'\; send C-u
# bind [ run 'tmux-rnu'

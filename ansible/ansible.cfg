[defaults]
inventory = inventory.yml
vault_password_file = .vault_pass
callbacks_enabled = ansible.posix.profile_tasks

# Mitogen: persistent Python workers on the target, ~5x per-task speedup.
# Path follows the uv tool venv. If you reinstall, recompute with:
#   python -c "import ansible_mitogen, os; print(os.path.dirname(ansible_mitogen.__file__) + '/plugins/strategy')"
strategy_plugins = /home/qd/.local/share/uv/tools/ansible-core/lib/python3.12/site-packages/ansible_mitogen/plugins/strategy
strategy = mitogen_linear

# Cache facts to disk and skip Gathering Facts when cache is fresh.
# `gathering = smart` is the key bit — without it, `gather_facts: true`
# in a play forces the setup module regardless of cache.
gathering = smart
fact_caching = jsonfile
fact_caching_connection = ~/.ansible/cache/facts
fact_caching_timeout = 86400

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=300s -o PreferredAuthentications=publickey

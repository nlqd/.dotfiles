- name: Install nginx and certbot
  ansible.builtin.apt:
    name:
      - nginx
      - certbot
    state: present

- name: Create /var/www/html
  ansible.builtin.file:
    path: /var/www/html
    state: directory
    owner: root

- name: Create /var/www/files
  ansible.builtin.file:
    path: /var/www/files
    state: directory
    owner: dungngo
    group: www-data

- name: Symlink ~/public to /var/www/files
  ansible.builtin.file:
    src: /var/www/files
    dest: /home/dungngo/public
    state: link
    owner: dungngo

- name: Stat certs
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ item.domain }}/fullchain.pem"
  loop: "{{ nginx_sites }}"
  loop_control:
    label: "{{ item.domain }}"
  register: cert_stats

- name: Build cert existence map
  ansible.builtin.set_fact:
    cert_exists_for: >-
      {{ dict(cert_stats.results | map(attribute='item.domain')
              | zip(cert_stats.results | map(attribute='stat.exists'))) }}

- name: Template nginx site configs
  ansible.builtin.template:
    src: "{{ item.template }}"
    dest: "/etc/nginx/sites-available/{{ item.name }}"
  loop: "{{ nginx_sites }}"
  vars:
    cert_exists: "{{ cert_exists_for[item.domain] }}"
  notify: reload nginx

- name: Enable nginx sites
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ item.name }}"
    dest: "/etc/nginx/sites-enabled/{{ item.name }}"
    state: link
  loop: "{{ nginx_sites | selectattr('enabled', 'undefined') | list + nginx_sites | selectattr('enabled', 'defined') | selectattr('enabled') | list }}"
  notify: reload nginx

- name: Disable nginx sites marked enabled=false
  ansible.builtin.file:
    path: "/etc/nginx/sites-enabled/{{ item.name }}"
    state: absent
  loop: "{{ nginx_sites | selectattr('enabled', 'defined') | rejectattr('enabled') | list }}"
  notify: reload nginx

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

# Reload nginx before certbot so /.well-known/acme-challenge is served.
- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Issue certs via webroot
  ansible.builtin.command:
    cmd: "certbot certonly --webroot -w /var/www/html -d {{ item.domain }} --non-interactive --agree-tos --email admin@dzungngo.com"
  loop: "{{ nginx_sites | selectattr('certbot', 'defined') | selectattr('certbot') | list }}"
  when:
    - item.enabled | default(true)
    - not cert_exists_for[item.domain]
  register: certbot_result
  changed_when: "'Successfully received certificate' in (certbot_result.stdout | default(''))"

# Re-stat + re-template so newly issued certs get their HTTPS server block.
# No-op on subsequent runs.
- name: Re-stat certs
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ item.domain }}/fullchain.pem"
  loop: "{{ nginx_sites }}"
  loop_control:
    label: "{{ item.domain }}"
  register: cert_stats_post

- name: Update cert existence map
  ansible.builtin.set_fact:
    cert_exists_for: >-
      {{ dict(cert_stats_post.results | map(attribute='item.domain')
              | zip(cert_stats_post.results | map(attribute='stat.exists'))) }}

- name: Re-template nginx site configs with SSL
  ansible.builtin.template:
    src: "{{ item.template }}"
    dest: "/etc/nginx/sites-available/{{ item.name }}"
  loop: "{{ nginx_sites }}"
  vars:
    cert_exists: "{{ cert_exists_for[item.domain] }}"
  notify: reload nginx

- hosts: all
  become: true
  gather_facts: true
  # Only ansible_distribution_release is actually used in roles; the rest
  # (ansible_host, ansible_user, ansible_ssh_private_key_file) are inventory vars.
  gather_subset:
    - "!all"
    - "!min"
    - distribution
  vars_files:
    - vault.yml
  roles:
    - role: base
      tags: base
    - role: fail2ban
      tags: fail2ban
    - role: nginx
      tags: nginx
    - role: mail
      tags: mail
    - role: docker
      tags: docker
